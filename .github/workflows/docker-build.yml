# Docker Hub only (docker.io). Set repository Variables (Settings → Variables):
#   DOCKERHUB_IMAGE_PREFIX — optional. Namespace/org on Docker Hub, e.g. myuser or myorg. If empty, uses DOCKERHUB_USERNAME secret.
#   DOCKER_IMAGE_TAG       — optional. If set, images are tagged only with this (plus -amd64/-arm64) and a multi-arch manifest with the same name. If empty, uses branch/semver/sha like the original workflow (main → latest, release/stable → stable).
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (for login and as default image prefix when DOCKERHUB_IMAGE_PREFIX is unset)

name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - dev
      - release/stable
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare image name
    runs-on: ubuntu-22.04
    outputs:
      image_prefix: ${{ steps.prefix.outputs.image_prefix }}
      manual_tag: ${{ steps.tag.outputs.manual_tag }}
      has_dockerhub: ${{ steps.creds.outputs.has_dockerhub }}
    steps:
      - name: Detect Docker Hub credentials
        id: creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "has_dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerhub=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Docker Hub image namespace
        id: prefix
        run: |
          P='${{ vars.DOCKERHUB_IMAGE_PREFIX }}'
          S='${{ secrets.DOCKERHUB_USERNAME }}'
          if [ -z "$P" ]; then
            P="$S"
          fi
          if [ -z "$P" ]; then
            P=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          fi
          echo "image_prefix=$P" >> $GITHUB_OUTPUT
          echo "image_prefix: $P"

      - name: Expose DOCKER_IMAGE_TAG
        id: tag
        run: |
          T='${{ vars.DOCKER_IMAGE_TAG }}'
          if [ -n "$T" ]; then
            echo "manual_tag=$T" >> $GITHUB_OUTPUT
            echo "tag mode: manual ($T)"
          else
            echo "manual_tag=" >> $GITHUB_OUTPUT
            echo "tag mode: auto (ref/semver)"
          fi

  build-and-push:
    name: Build ${{ matrix.name }} (${{ matrix.arch_tag }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: ./docker/Dockerfile.backend
            image_suffix: backend
            platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-22.04
          - name: backend
            dockerfile: ./docker/Dockerfile.backend
            image_suffix: backend
            platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-22.04-arm
          - name: frontend
            dockerfile: ./docker/Dockerfile.frontend
            image_suffix: frontend
            platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-22.04
          - name: frontend
            dockerfile: ./docker/Dockerfile.frontend
            image_suffix: frontend
            platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && needs.prepare.outputs.has_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (auto tags)
        if: needs.prepare.outputs.manual_tag == ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ needs.prepare.outputs.image_prefix }}/nofx-${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.arch_tag }}
            type=semver,pattern={{version}},suffix=-${{ matrix.arch_tag }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.arch_tag }}
            type=semver,pattern={{major}},suffix=-${{ matrix.arch_tag }}
            type=sha,prefix={{branch}}-,suffix=-${{ matrix.arch_tag }}

      - name: Build and push ${{ matrix.name }}-${{ matrix.arch_tag }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ needs.prepare.outputs.manual_tag != '' && format('{0}/nofx-{1}:{2}-{3}', needs.prepare.outputs.image_prefix, matrix.image_suffix, needs.prepare.outputs.manual_tag, matrix.arch_tag) || steps.meta.outputs.tags }}
          labels: ${{ needs.prepare.outputs.manual_tag == '' && steps.meta.outputs.labels || format('org.opencontainers.image.revision={0}', github.sha) }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch_tag }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Image digest
        run: |
          echo "✅ Built: ${{ matrix.name }}-${{ matrix.arch_tag }}"
          echo "Platform: ${{ matrix.platform }}"

  create-manifest:
    name: Create multi-arch manifests (Docker Hub)
    if: github.event_name != 'pull_request'
    needs: [prepare, build-and-push]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      matrix:
        image_suffix: [backend, frontend]
    steps:
      - name: Log in to Docker Hub
        if: needs.prepare.outputs.has_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          if [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" || -z "${{ secrets.DOCKERHUB_USERNAME }}" ]]; then
            echo "No Docker Hub credentials; skipping manifest."
            exit 0
          fi

          PREFIX='${{ needs.prepare.outputs.image_prefix }}'
          IMAGE="${PREFIX}/nofx-${{ matrix.image_suffix }}"

          MANUAL='${{ needs.prepare.outputs.manual_tag }}'
          if [[ -n "$MANUAL" ]]; then
            REF_NAME="$MANUAL"
          else
            REF_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          fi

          echo "📦 Docker Hub manifest: ${IMAGE}"
          echo "Ref / tag: ${REF_NAME}"

          docker buildx imagetools create -t "${IMAGE}:${REF_NAME}" \
            "${IMAGE}:${REF_NAME}-amd64" \
            "${IMAGE}:${REF_NAME}-arm64"

          if [[ -n "$MANUAL" ]]; then
            echo "✅ Manual DOCKER_IMAGE_TAG: single manifest only."
            echo "🎉 Done"
            exit 0
          fi

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker buildx imagetools create -t "${IMAGE}:latest" \
              "${IMAGE}:${REF_NAME}-amd64" \
              "${IMAGE}:${REF_NAME}-arm64"
            echo "✅ :latest (main)"
          fi

          if [[ "${{ github.ref }}" == "refs/heads/release/stable" ]]; then
            docker buildx imagetools create -t "${IMAGE}:stable" \
              "${IMAGE}:${REF_NAME}-amd64" \
              "${IMAGE}:${REF_NAME}-arm64"
            echo "✅ :stable (release/stable)"
          fi

          echo "🎉 Multi-arch manifest(s) on Docker Hub"
